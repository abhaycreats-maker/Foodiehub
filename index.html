<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FoodieHub</title>

<link rel="stylesheet" href="style.css">

<!-- AOS -->
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>

</head>
<body>

<header>
  <h1>🍽️ FoodieHub</h1>
  <button onclick="showLogin()">Login</button>
</header>

<section class="hero">
  <h2>Delicious Food, Delivered Fast</h2>
  <p>Order your favorite meals now</p>
</section>

<section class="products">
  <h2>Our Menu</h2>

  <div class="card" data-aos="zoom-in">
    <img src="https://source.unsplash.com/300x200/?pizza">
    <h3>Pizza</h3>
    <p>₹299</p>
    <button onclick="orderItem('Pizza',299)">Order</button>
  </div>

  <div class="card" data-aos="zoom-in">
    <img src="https://source.unsplash.com/300x200/?burger">
    <h3>Burger</h3>
    <p>₹149</p>
    <button onclick="orderItem('Burger',149)">Order</button>
  </div>

  <div class="card" data-aos="zoom-in">
    <img src="https://source.unsplash.com/300x200/?pasta">
    <h3>Pasta</h3>
    <p>₹199</p>
    <button onclick="orderItem('Pasta',199)">Order</button>
  </div>

</section>

<section class="order-box" id="orderBox">
  <h2>Place Order</h2>
  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="address" placeholder="Your Address">
  <input type="text" id="item" readonly>
  <button onclick="sendWhatsApp()">Confirm Order</button>
</section>

<section class="login" id="loginBox">
  <h2>Signup / Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</section>

<section class="about">
  <h2>About Us</h2>
  <p>We serve best food with premium quality & fast delivery.</p>
</section>

<!-- JS Libraries -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script src="script.js"></script>

</body>
</html>
